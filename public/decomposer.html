<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI画像分解エディタ</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0f0f13; color:#e0e0e8; font-family:"Hiragino Sans","Noto Sans JP",sans-serif; overflow:hidden; height:100vh; }

  /* Toolbar */
  .toolbar { display:flex; align-items:center; gap:8px; padding:8px 16px; background:#18181f; border-bottom:1px solid #333; flex-wrap:wrap; }
  .toolbar-brand { font-weight:700; font-size:14px; background:linear-gradient(135deg,#ff0066,#ff9900); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .toolbar-sep { width:1px; height:20px; background:#444; }
  .tb-btn { padding:4px 10px; font-size:11px; border-radius:6px; border:none; background:#2a2a35; color:#e0e0e8; cursor:pointer; transition:background .15s; }
  .tb-btn:hover { background:#3a3a45; }
  .tb-btn.active { background:#ff0066; color:#fff; }
  .tb-btn:disabled { opacity:.5; cursor:default; }
  .tb-spacer { flex:1; }
  .tb-count { font-size:11px; color:#888; }

  /* Layout */
  .editor-layout { display:flex; flex:1; overflow:hidden; height:calc(100vh - 41px); }
  .preview-area { flex:1; display:flex; align-items:flex-start; justify-content:center; padding:16px; overflow:auto; position:relative; }
  .panel { width:300px; flex-shrink:0; background:#18181f; border-left:1px solid #333; overflow-y:auto; padding:12px; }

  /* Upload screen */
  .upload-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; width:100%; }
  .upload-title { font-size:28px; font-weight:700; margin-bottom:8px; background:linear-gradient(135deg,#ff0066,#ff9900); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .upload-sub { color:#888; font-size:13px; margin-bottom:24px; }
  .upload-drop { width:100%; max-width:420px; border:2px dashed #444; border-radius:12px; padding:48px 24px; text-align:center; cursor:pointer; transition:border-color .2s, background .2s; }
  .upload-drop:hover { border-color:#ff0066; background:#18181f; }
  .upload-drop .icon { font-size:40px; margin-bottom:12px; }
  .upload-drop .main-text { font-size:14px; font-weight:500; }
  .upload-drop .sub-text { font-size:12px; color:#888; margin-top:4px; }
  .upload-drop .hint { font-size:11px; color:#666; margin-top:8px; }

  /* Image preview (before decompose) */
  .image-preview { display:flex; flex-direction:column; align-items:center; gap:16px; }
  .image-preview img { max-width:100%; max-height:65vh; border-radius:8px; box-shadow:0 8px 32px rgba(0,0,0,.5); }
  .analyze-btn { padding:12px 28px; border-radius:8px; border:none; font-weight:700; font-size:14px; color:#fff; cursor:pointer; background:linear-gradient(135deg,#ff0066,#ff9900); transition:opacity .2s; }
  .analyze-btn:hover { opacity:.9; }
  .analyze-btn:disabled { background:#444; cursor:default; opacity:.7; }
  .analyze-btn .spinner { display:inline-block; width:14px; height:14px; border:2px solid #fff; border-top-color:transparent; border-radius:50%; animation:spin .6s linear infinite; margin-right:6px; vertical-align:middle; }

  /* Decomposed canvas */
  .decomposed-canvas { position:relative; border-radius:8px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,.5); width:100%; max-width:600px; }
  .decomposed-canvas .element { position:absolute; cursor:move; user-select:none; display:flex; align-items:center; padding:2px 4px; line-height:1.2; white-space:pre-wrap; word-break:break-all; overflow:hidden; transition:box-shadow .15s; }
  .decomposed-canvas .element.selected { box-shadow:0 0 0 2px #00bfff, 0 0 12px rgba(0,191,255,.3); }
  .decomposed-canvas .element.placeholder { background:#2a2a35; border:1px dashed #666; border-radius:4px; justify-content:center; color:#888; font-size:11px; }
  .decomposed-canvas .element.bg-area { pointer-events:none; }

  /* Reference overlay */
  .ref-overlay { position:absolute; inset:0; pointer-events:none; opacity:.25; z-index:9999; display:flex; align-items:flex-start; justify-content:center; padding:16px; }
  .ref-overlay img { width:100%; max-width:600px; border-radius:8px; object-fit:contain; }

  /* Panel styles */
  .panel-section { margin-bottom:16px; }
  .panel-label { font-size:10px; color:#888; font-weight:600; text-transform:uppercase; letter-spacing:.3px; margin-bottom:6px; }
  .panel-input { width:100%; padding:6px 8px; font-size:12px; border:1px solid #444; border-radius:6px; background:#2a2a35; color:#e0e0e8; transition:border-color .15s; }
  .panel-input:focus { border-color:#3b82f6; outline:none; }
  .panel-textarea { width:100%; padding:6px 8px; font-size:12px; border:1px solid #444; border-radius:6px; background:#2a2a35; color:#e0e0e8; resize:vertical; min-height:60px; }

  /* Element chips */
  .chips { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:12px; }
  .chip { font-size:10px; padding:2px 8px; border-radius:8px; font-weight:600; }

  /* Text list */
  .text-item { margin-bottom:12px; }
  .text-item-label { font-size:10px; color:#888; margin-bottom:3px; display:flex; align-items:center; gap:4px; }
  .text-item-num { font-weight:700; padding:1px 4px; border-radius:3px; font-size:9px; }
  .text-item input { width:100%; padding:6px 8px; font-size:12px; border:1px solid #444; border-radius:6px; background:#2a2a35; color:#e0e0e8; font-weight:500; transition:border-color .15s; }
  .text-item input:focus { border-color:#3b82f6; outline:none; }
  .style-btn { font-size:10px; padding:2px 8px; border:1px solid #444; border-radius:4px; background:none; color:#888; cursor:pointer; margin-top:4px; transition:all .15s; }
  .style-btn:hover { border-color:#3b82f6; color:#3b82f6; }

  /* Property editor buttons */
  .prop-btn-row { display:flex; gap:4px; }
  .prop-btn { flex:1; padding:4px; font-size:11px; border-radius:4px; border:none; cursor:pointer; transition:background .15s; }
  .prop-btn.off { background:#2a2a35; color:#e0e0e8; }
  .prop-btn.on { background:#ff0066; color:#fff; }
  .prop-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px; }
  .prop-num { display:flex; align-items:center; gap:4px; }
  .prop-num label { font-size:10px; color:#888; width:14px; font-weight:600; flex-shrink:0; }
  .prop-num input { width:100%; padding:3px 6px; font-size:11px; border:1px solid #444; border-radius:4px; background:#2a2a35; color:#e0e0e8; }
  .action-row { display:flex; gap:8px; margin-top:8px; padding-top:8px; border-top:1px solid #333; }
  .action-btn { flex:1; padding:6px; font-size:11px; border-radius:6px; border:none; cursor:pointer; transition:background .15s; }
  .action-btn.dup { background:#2a2a35; color:#e0e0e8; }
  .action-btn.dup:hover { background:#3a3a45; }
  .action-btn.del { background:rgba(255,0,102,.15); color:#ff0066; }
  .action-btn.del:hover { background:rgba(255,0,102,.25); }

  .error-bar { padding:8px 16px; background:rgba(220,38,38,.15); border-bottom:1px solid rgba(220,38,38,.3); color:#fca5a5; font-size:12px; }

  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
  <div id="app"></div>
  <input type="file" id="file-input" accept="image/*" style="display:none">
  <script src="/js/decomposer.js"></script>
</body>
</html>
